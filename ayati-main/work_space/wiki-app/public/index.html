<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Local Wiki</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <div id="app">
    <header><h1>Local Wiki</h1></header>
    <main>
      <aside id="sidebar">
        <button id="newBtn">New Page</button>
        <ul id="pages"></ul>
      </aside>
      <section id="editorPane">
        <input id="title" placeholder="Page title" />
        <div id="editorControls"><button id="saveBtn">Save</button><button id="previewBtn">Preview</button></div>
        <textarea id="content" rows="15"></textarea>
        <div id="preview" hidden></div>
      </section>
    </main>
  </div>
  <script src="app.js"></script>
</body>
</html>
