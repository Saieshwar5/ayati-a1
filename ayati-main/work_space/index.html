<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sai Eshwar's Diet Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: green;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        header h1 {
            font-size: 1.8rem;
            margin-bottom: 5px;
        }

        header p {
            opacity: 0.9;
            font-size: 0.9rem;
        }

        .stats-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            padding: 20px;
            background: #f8f9fa;
        }

        .stat-card {
            background: white;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .stat-card.calories {
            border-top: 4px solid #667eea;
        }

        .stat-card.protein {
            border-top: 4px solid #28a745;
        }

        .stat-card.carbs {
            border-top: 4px solid #ffc107;
        }

        .stat-card.fat {
            border-top: 4px solid #dc3545;
        }

        .stat-label {
            font-size: 0.75rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #333;
        }

        .form-section {
            padding: 25px;
        }

        .form-section h2 {
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: #333;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9rem;
            color: #555;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .meals-section {
            padding: 0 25px 25px;
        }

        .meals-section h2 {
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: #333;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .meal-list {
            list-style: none;
        }

        .meal-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: transform 0.2s;
        }

        .meal-item:hover {
            transform: translateX(5px);
        }

        .meal-info h4 {
            font-size: 1rem;
            color: #333;
            margin-bottom: 5px;
        }

        .meal-macros {
            font-size: 0.8rem;
            color: #666;
        }

        .meal-macros span {
            margin-right: 10px;
        }

        .meal-calories {
            font-size: 1.2rem;
            font-weight: bold;
            color: #667eea;
        }

        .btn-delete {
            background: #dc3545;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            margin-left: 10px;
        }

        .btn-delete:hover {
            background: #c82333;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .empty-state svg {
            width: 60px;
            height: 60px;
            margin-bottom: 15px;
            opacity: 0.5;
        }

        .clear-all-btn {
            background: #6c757d;
            margin-top: 15px;
        }

        .clear-all-btn:hover {
            background: #5a6268;
        }

        @media (max-width: 480px) {
            body {
                padding: 10px;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .stats-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🥗 Diet Tracker</h1>
            <p>Sai Eshwar's Personal Nutrition Log</p>
        </header>

        <div class="stats-container">
            <div class="stat-card calories">
                <div class="stat-label">Calories</div>
                <div class="stat-value" id="total-calories">0</div>
            </div>
            <div class="stat-card protein">
                <div class="stat-label">Protein (g)</div>
                <div class="stat-value" id="total-protein">0</div>
            </div>
            <div class="stat-card carbs">
                <div class="stat-label">Carbs (g)</div>
                <div class="stat-value" id="total-carbs">0</div>
            </div>
            <div class="stat-card fat">
                <div class="stat-label">Fat (g)</div>
                <div class="stat-value" id="total-fat">0</div>
            </div>
        </div>

        <div class="form-section">
            <h2>
                <span>➕</span> Add Meal
            </h2>
            <form id="meal-form">
                <div class="form-group">
                    <label for="food-name">Food Name</label>
                    <input type="text" id="food-name" placeholder="e.g., Grilled Chicken Breast" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="calories">Calories</label>
                        <input type="number" id="calories" placeholder="0" min="0" required>
                    </div>
                    <div class="form-group">
                        <label for="protein">Protein (g)</label>
                        <input type="number" id="protein" placeholder="0" min="0" step="0.1">
                    </div>
                    <div class="form-group">
                        <label for="carbs">Carbs (g)</label>
                        <input type="number" id="carbs" placeholder="0" min="0" step="0.1">
                    </div>
                </div>
                <div class="form-group">
                    <label for="fat">Fat (g)</label>
                    <input type="number" id="fat" placeholder="0" min="0" step="0.1">
                </div>
                <button type="submit" class="btn">Add to Log</button>
            </form>
        </div>

        <div class="meals-section">
            <h2>
                <span>📋</span> Today's Meals
            </h2>
            <ul class="meal-list" id="meal-list">
                <li class="empty-state">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
                    </svg>
                    <p>No meals added yet. Start tracking your nutrition!</p>
                </li>
            </ul>
            <button id="clear-all" class="btn clear-all-btn" style="display: none;">Clear All Meals</button>
        </div>
    </div>

    <script>
        // App State
        let meals = [];

        // DOM Elements
        const mealForm = document.getElementById('meal-form');
        const mealList = document.getElementById('meal-list');
        const totalCaloriesEl = document.getElementById('total-calories');
        const totalProteinEl = document.getElementById('total-protein');
        const totalCarbsEl = document.getElementById('total-carbs');
        const totalFatEl = document.getElementById('total-fat');
        const clearAllBtn = document.getElementById('clear-all');

        // Load meals from localStorage on page load
        document.addEventListener('DOMContentLoaded', () => {
            loadMeals();
        });

        // Form submission handler
        mealForm.addEventListener('submit', (e) => {
            e.preventDefault();
            addMeal();
        });

        // Clear all meals handler
        clearAllBtn.addEventListener('click', () => {
            if (confirm('Are you sure you want to clear all meals for today?')) {
                meals = [];
                saveMeals();
                renderMeals();
            }
        });

        // Add a new meal
        function addMeal() {
            const foodName = document.getElementById('food-name').value.trim();
            const calories = parseFloat(document.getElementById('calories').value) || 0;
            const protein = parseFloat(document.getElementById('protein').value) || 0;
            const carbs = parseFloat(document.getElementById('carbs').value) || 0;
            const fat = parseFloat(document.getElementById('fat').value) || 0;

            if (!foodName || calories <= 0) {
                alert('Please enter a food name and valid calorie amount');
                return;
            }

            const meal = {
                id: Date.now(),
                name: foodName,
                calories: calories,
                protein: protein,
                carbs: carbs,
                fat: fat,
                timestamp: new Date().toISOString()
            };

            meals.push(meal);
            saveMeals();
            renderMeals();
            mealForm.reset();
            document.getElementById('food-name').focus();
        }

        // Delete a single meal
        function deleteMeal(id) {
            meals = meals.filter(meal => meal.id !== id);
            saveMeals();
            renderMeals();
        }

        // Save meals to localStorage
        function saveMeals() {
            localStorage.setItem('dietTracker_meals', JSON.stringify(meals));
        }

        // Load meals from localStorage
        function loadMeals() {
            const stored = localStorage.getItem('dietTracker_meals');
            if (stored) {
                meals = JSON.parse(stored);
                renderMeals();
            }
        }

        // Render meals list and update totals
        function renderMeals() {
            // Update totals
            const totals = meals.reduce((acc, meal) => {
                acc.calories += meal.calories;
                acc.protein += meal.protein;
                acc.carbs += meal.carbs;
                acc.fat += meal.fat;
                return acc;
            }, { calories: 0, protein: 0, carbs: 0, fat: 0 });

            totalCaloriesEl.textContent = Math.round(totals.calories);
            totalProteinEl.textContent = totals.protein.toFixed(1);
            totalCarbsEl.textContent = totals.carbs.toFixed(1);
            totalFatEl.textContent = totals.fat.toFixed(1);

            // Render meal list
            if (meals.length === 0) {
                mealList.innerHTML = `
                    <li class="empty-state">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
                        </svg>
                        <p>No meals added yet. Start tracking your nutrition!</p>
                    </li>
                `;
                clearAllBtn.style.display = 'none';
            } else {
                mealList.innerHTML = meals.map(meal => `
                    <li class="meal-item">
                        <div class="meal-info">
                            <h4>${escapeHtml(meal.name)}</h4>
                            <div class="meal-macros">
                                <span>🥩 ${meal.protein.toFixed(1)}g protein</span>
                                <span>🍞 ${meal.carbs.toFixed(1)}g carbs</span>
                                <span>🥑 ${meal.fat.toFixed(1)}g fat</span>
                            </div>
                        </div>
                        <div style="display: flex; align-items: center;">
                            <span class="meal-calories">${Math.round(meal.calories)} kcal</span>
                            <button class="btn-delete" onclick="window.deleteMealById(${meal.id})">✕</button>
                        </div>
                    </li>
                `).join('');
                clearAllBtn.style.display = 'block';
            }
        }

        // Helper function to escape HTML (prevent XSS)
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Global function for inline onclick handlers
        window.deleteMealById = deleteMeal;
    </script>
</body>
</html>
